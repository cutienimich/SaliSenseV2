<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <title>SaliSense</title>
    <style>
    #loading-screen {
        position: fixed;
        inset: 0;
        background: #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.5s ease;
    }

    #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
    }

    .loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
    }

    .loader-logo {
        width: 200px;
        height: auto;
        animation: pulse 1.5s ease-in-out infinite;
    }

    .loader-emojis {
        display: flex;
        gap: 12px;
    }

    .loader-emoji {
        width: 48px;
        height: 48px;
        animation: bounce 0.6s ease-in-out infinite alternate;
    }

    .loader-emoji:nth-child(1) { animation-delay: 0s; }
    .loader-emoji:nth-child(2) { animation-delay: 0.15s; }
    .loader-emoji:nth-child(3) { animation-delay: 0.3s; }
    .loader-emoji:nth-child(4) { animation-delay: 0.45s; }

    .loader-bar {
        width: 200px;
        height: 6px;
        background: #404040;
        border-radius: 3px;
        overflow: hidden;
    }

    .loader-fill {
        height: 100%;
        background: #FFB300;
        border-radius: 3px;
        animation: load 1.5s ease-in-out infinite;
    }

    .loader-text {
        color: #aaa;
        font-family: 'Ubuntu', sans-serif;
        font-size: 0.9rem;
        letter-spacing: 2px;
    }

    @keyframes bounce {
        from { transform: translateY(0px); }
        to   { transform: translateY(-12px); }
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.8; transform: scale(0.97); }
    }

    @keyframes load {
        0%   { width: 0%; margin-left: 0; }
        50%  { width: 100%; margin-left: 0; }
        100% { width: 0%; margin-left: 100%; }
    }
</style>
  </head>
<body>
    <div id="loading-screen">
    <div class="loader-content">
        <div class="loader-emojis">
            <img src="/happy.png" class="loader-emoji" />
            <img src="/cool.png" class="loader-emoji" />
            <img src="/sad.png" class="loader-emoji" />
            <img src="/angry.png" class="loader-emoji" />
        </div>
        <div class="loader-bar">
            <div class="loader-fill"></div>
        </div>
        <p class="loader-text">Naglo-load...</p>
    </div>
</div>
  <div id="emoji-bg">
    <!-- Top Area -->
    <img src="/crying.png" />
    <img src="/sad.png" />
    <img src="/silly.png" />
    <img src="/angry.png" />
    <!-- Right Area -->
    <img src="/cool.png" />
    <img src="/uwu.png" />
    <!-- Left Area -->
    <img src="/happy.png" />
    <img src="/emotion1.png" />
    <!-- Bottom Area -->
    <img src="/shocked.png" />
    <img src="/ahhh.png" />
    <img src="/kiss.png" />
    <img src="/strawberry.png" />
    <!-- Medium Stars -->
    <img src="/blueStar.png" />
    <img src="/greenStar.png" />
    <img src="/pinkStar.png" />
    <img src="/purpleStar.png" />
    <!-- Small Stars -->
    <img src="/yellowStar.png" />
    <img src="/redStar.png" />
    <img src="/blueStar.png" />
    <!-- Hearts -->
    <img src="/redHeart.png" />
    <img src="/redHeart.png" />
    <img src="/redHeart.png" />
</div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
    window.addEventListener('load', () => {
        const loader = document.getElementById('loading-screen');
        setTimeout(() => {
            loader.classList.add('hidden');
            setTimeout(() => loader.remove(), 500);
        }, 800);
    });
</script>
  </body>
</html>
